# Настройки модели
model:
  name: "yolov8n-pose.pt"  # yolov8n-pose, yolov8s-pose, yolov8m-pose, yolov8l-pose
  confidence: 0.5
  device: "cuda"  # cuda или cpu

# Настройки видео
video:
  fps: 30
  codec: "mp4v"
  extension: ".mp4"
  frame_step: 5  # обрабатывать каждый 5-й кадр

# Цвета для визуализации (BGR)
colors:
  - [0, 255, 0]    # зеленый

skeleton:
  # Голова (у вас это работает правильно)
  - [0, 1]   # нос - левый глаз
  - [0, 2]   # нос - правый глаз
  - [1, 3]   # левый глаз - левое ухо
  - [2, 4]   # правый глаз - правое ухо
  
  # Плечи и торс (ИСПРАВЛЕНО)
  - [5, 6]   # левое плечо - правое плечо
  - [5, 7]   # левое плечо - левый локоть
  - [6, 8]   # правое плечо - правый локоть
  - [7, 9]   # левый локоть - левое запястье
  - [8, 10]  # правый локоть - правое запястье
  
  # Тело (ИСПРАВЛЕНО)
  - [5, 11]  # левое плечо - левое бедро
  - [6, 12]  # правое плечо - правое бедро
  - [11, 12] # левое бедро - правое бедро (ДОБАВЛЕНО - соединение бедер)
  - [11, 13] # левое бедро - левое колено
  - [13, 15] # левое колено - левая лодыжка
  - [12, 14] # правое бедро - правое колено
  - [14, 16] # правое колено - правая лодыжка

# Логирование
logging:
  print_interval: 50  # выводить прогресс каждые N кадров
  verbose: true
  log_file: "pose_processing.log"