services:
  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hakaton-kion-pipeline
    runtime: nvidia
    environment:
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_TOKEN}
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - CUDA_HOME=/usr/local/cuda
      - BNB_CUDA_VERSION=130
      - HF_HUB_ENABLE_HF_TRANSFER=1
      - TRANSFORMERS_CACHE=/app/cache/huggingface
      - HF_HOME=/app/cache/huggingface
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
      - ./requirements.txt:/app/requirements.txt
      - ./config:/app/config
      - ./cache:/app/cache
      - ./src:/app/src
    shm_size: 16g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ulimits:
      memlock: -1
      stack: 67108864
    working_dir: /app

  vlm:
    build:
      context: .
      dockerfile: docker/Dockerfile.vlm
    container_name: hakaton-kion-vlm
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/app/cache/huggingface
      - TRANSFORMERS_CACHE=/app/cache/huggingface
      - TORCH_HOME=/app/cache/torch
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - ./cache:/app/cache
      - ./src:/app/src
      - ./requirements_vlm.txt:/app/requirements_vlm.txt
    shm_size: 16g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ulimits:
      memlock: -1
      stack: 67108864
    working_dir: /app

  mmaction2:
    build:
      context: .
      dockerfile: docker/Dockerfile.mmaction2
    container_name: hakaton-kion-mmaction2
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - TORCH_HOME=/app/cache/torch
      - HF_HOME=/app/cache/huggingface
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./src:/app/src
      - ./config:/app/config
      - ./scripts:/app/scripts
    shm_size: 16g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ulimits:
      memlock: -1
      stack: 67108864
    working_dir: /app